name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site for project-path deploy
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R site/. _site/

          python - <<'PY'
          from pathlib import Path
          import os, re

          repo = os.environ["REPO_NAME"]
          allowed = {".html", ".css", ".js", ".xml", ".webmanifest", ".txt"}

          for path in Path("_site").rglob("*"):
              if not path.is_file():
                  continue
              if path.suffix.lower() not in allowed:
                  continue

              text = path.read_text(encoding="utf-8")

              # Rewrite quoted root-relative paths:
              # "/assets/..." -> "/QuickBrakeRepair/assets/..."
              # '/premium/'   -> '/QuickBrakeRepair/premium/'
              text = re.sub(
                  r'(["\'])/(?!/)',
                  lambda m: f'{m.group(1)}/{repo}/',
                  text,
              )

              path.write_text(text, encoding="utf-8")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4